    const composites = [
      [4,2,2],[486,2,243],[424,8,53],[522,29,18],[236,4,59],[12,6,2],[270,3,90],[243,9,27],
      [20,10,2],[246,2,123],[150,5,30],[441,21,21],[28,14,2],[36,18,2],[325,13,25],[6,2,3],
      [391,17,23],[488,2,244],[44,22,2],[240,4,60],[432,8,54],[273,3,91],[18,6,3],[500,25,20],
      [52,26,2],[248,2,124],[155,5,31],[252,9,28],[60,30,2],[30,10,3],[68,34,2],[8,2,4],

      [212,106,2],[152,38,4],[377,13,29],[186,62,3],[220,110,2],[288,3,96],[288,9,32],
      [258,2,129],[130,26,5],[260,4,65],[228,114,2],[70,10,7],[198,66,3],[168,42,4],
      [459,17,27],[108,18,6],[525,21,25],[236,118,2],[48,6,8],[18,2,9],[210,70,3],
      [500,2,250],[180,5,36],[244,122,2],[150,30,5],[472,8,59],[184,46,4],[252,126,2],
      [222,74,3],[98,14,7],[260,130,2],[291,3,97],[260,2,130],[132,22,6],[390,13,30],
      [264,4,66],[200,50,4],[297,9,33],[170,34,5],[268,134,2],[234,78,3],[80,10,8],
      [276,138,2]
    ];

    const totalFirings = timings.length;
    const maxTime = timings[timings.length - 1];
    const maxComposite = 541;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const pad = { top: 20, right: 30, bottom: 40, left: 55 };
    const w = canvas.width - pad.left - pad.right;
    const h = canvas.height - pad.top - pad.bottom;

    const drawn = new Array(totalFirings).fill(false);
    let frame = 0;
    let playing = false;
    let timer = null;

    function getInterval() {
      const v = document.getElementById('speed').value;
      return Math.max(5, 200 - v * 2);
    }

    function toX(timeNs) {
      return pad.left + (timeNs / maxTime) * w;
    }

    function toY(compositeVal) {
      return pad.top + h - (compositeVal / maxComposite) * h;
    }

    function drawAxes() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;

      ctx.fillStyle = '#888';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      for (let c = 0; c <= maxComposite; c += 100) {
        const y = toY(c);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + w, y);
        ctx.stroke();
        ctx.fillText(c, pad.left - 6, y + 3);
      }

      ctx.textAlign = 'center';
      for (let t = 0; t <= maxTime; t += 500000) {
        const x = toX(t);
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, pad.top + h);
        ctx.stroke();
        if (t % 1000000 === 0) {
          ctx.fillText((t / 1e6).toFixed(0) + ' ms', x, pad.top + h + 16);
        }
      }

      ctx.fillStyle = '#555';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Elapsed time', pad.left + w / 2, pad.top + h + 35);
      ctx.save();
      ctx.translate(14, pad.top + h / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Composite number removed', 0, 0);
      ctx.restore();
    }

    function drawBar(firingIndex) {
      if (firingIndex >= composites.length) return;
      const t = timings[firingIndex];
      const comp = composites[firingIndex][0];
      const x = toX(t);
      const yTop = toY(comp);
      const yBase = toY(0);

      ctx.strokeStyle = 'rgba(231, 76, 60, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, yBase);
      ctx.lineTo(x, yTop);
      ctx.stroke();

      ctx.fillStyle = 'rgba(231, 76, 60, 0.9)';
      ctx.beginPath();
      ctx.arc(x, yTop, 2, 0, Math.PI * 2);
      ctx.fill();

      drawn[firingIndex] = true;
    }

    function highlightLatest(firingIndex) {
      if (firingIndex >= composites.length) return;
      const t = timings[firingIndex];
      const comp = composites[firingIndex][0];
      const x = toX(t);
      const yTop = toY(comp);

      ctx.fillStyle = 'rgba(231, 76, 60, 0.25)';
      ctx.beginPath();
      ctx.arc(x, yTop, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    function redrawAll() {
      drawAxes();
      for (let i = 0; i < totalFirings; i++) {
        if (drawn[i]) drawBar(i);
      }
    }

    function updateInfo(i) {
      document.getElementById('counter').textContent = i + ' / ' + totalFirings;
      const info = document.getElementById('info');
      if (i > 0 && i <= composites.length) {
        const f = composites[i - 1];
        info.textContent = '#' + i + ': Remove ' + f[0] + ' = ' + f[1] + ' \u00d7 ' + f[2] +
          '  |  t = ' + (timings[i-1] / 1e6).toFixed(2) + ' ms';
      } else if (i > 0) {
        info.textContent = '#' + i + '  |  t = ' + (timings[i-1] / 1e6).toFixed(2) + ' ms';
      } else {
        info.textContent = '\u00a0';
      }
    }

    function step() {
      if (frame < totalFirings) {
        drawBar(frame);
        redrawAll();
        highlightLatest(frame);
        frame++;
        updateInfo(frame);
      } else {
        pause();
      }
    }

    function play() {
      if (playing) return;
      playing = true;
      timer = setInterval(step, getInterval());
    }

    function pause() {
      playing = false;
      if (timer) { clearInterval(timer); timer = null; }
    }

    function reset() {
      pause();
      frame = 0;
      drawn.fill(false);
      drawAxes();
      updateInfo(0);
    }

    document.getElementById('btnPlay').onclick = play;
    document.getElementById('btnPause').onclick = pause;
    document.getElementById('btnReset').onclick = reset;
    document.getElementById('speed').oninput = function() {
      if (playing) {
        clearInterval(timer);
        timer = setInterval(step, getInterval());
      }
    };

    drawAxes();
    updateInfo(0);
  </script>
</body>
